<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1e">
<title>SwingBot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg:      #0a0f1e;
    --surface: #111827;
    --border:  #1e2d45;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --green:   #10b981;
    --red:     #ef4444;
    --yellow:  #f59e0b;
    --blue:    #3b82f6;
    --accent:  #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; padding-bottom: 80px; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--accent); }
  .header-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  .live-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 53px; z-index: 99; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 70px; padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 12px; }
  .section { display: none; }
  .section.active { display: block; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .card-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; }

  .sentiment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .sentiment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .sentiment-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .sentiment-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge-trade  { background: rgba(16,185,129,0.15); color: var(--green); }
  .badge-reduce { background: rgba(245,158,11,0.15);  color: var(--yellow); }
  .badge-skip   { background: rgba(239,68,68,0.15);   color: var(--red); }
  .sentiment-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .sentiment-row:last-child { border-bottom: none; }
  .sentiment-label { color: var(--muted); font-size: 12px; }
  .sentiment-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
  .score-bar { display: flex; gap: 4px; margin-top: 10px; }
  .score-pip { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
  .score-pip.filled { background: var(--green); }
  .score-pip.red    { background: var(--red); }

  /* Position cards */
  .pos-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .pos-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .pos-symbol { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
  .pos-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .pos-status { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 12px; }
  .status-PROFIT  { background: rgba(16,185,129,0.15); color: var(--green); }
  .status-LOSS    { background: rgba(239,68,68,0.15);  color: var(--red); }
  .status-TARGET  { background: rgba(16,185,129,0.2);  color: var(--green); }
  .status-STOP    { background: rgba(239,68,68,0.2);   color: var(--red); }
  .status-HOLDING { background: rgba(99,102,241,0.15); color: var(--accent); }

  /* Live price row */
  .pos-price-row { display: flex; justify-content: space-between; align-items: center; background: rgba(99,102,241,0.08); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; }
  .pos-ltp-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .pos-ltp { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: var(--text); }
  .pos-pnl { text-align: right; }
  .pos-pnl-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
  .pos-pnl-pct { font-size: 11px; margin-top: 2px; }

  .pos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .pos-item-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .pos-item-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 2px; }

  /* Progress bar */
  .pos-progress-wrap { margin-top: 10px; }
  .pos-progress-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-bottom: 4px; }
  .pos-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; position: relative; }
  .pos-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .pos-progress-entry { position: absolute; top: -2px; height: 8px; width: 2px; background: var(--text); border-radius: 1px; }

  /* Signal cards */
  .sig-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .sig-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .sig-symbol { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; }
  .sig-rr { font-size: 11px; color: var(--accent); font-weight: 600; }
  .sig-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .sig-reason { margin-top: 8px; font-size: 11px; color: var(--muted); font-style: italic; }

  /* Trade rows */
  .trade-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .trade-symbol { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
  .trade-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .trade-pnl { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; text-align: right; }
  .trade-reason { font-size: 10px; color: var(--muted); margin-top: 2px; text-align: right; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-text { font-size: 13px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .green  { color: var(--green); }
  .red    { color: var(--red); }
  .yellow { color: var(--yellow); }
  .blue   { color: var(--blue); }
  .white  { color: var(--text); }
  .muted  { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">⚡ SwingBot</div>
  <div class="header-time"><span class="live-dot"></span><span id="last-updated">--:--:--</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('positions')">Positions</div>
  <div class="tab" onclick="showTab('signals')">Signals</div>
  <div class="tab" onclick="showTab('trades')">Trades</div>
  <div class="tab" onclick="showTab('pnl')">P&amp;L</div>
</div>

<div class="content">

  <!-- OVERVIEW -->
  <div class="section active" id="tab-overview">
    <div class="cards">
      <div class="card"><div class="card-label">Open Positions</div><div class="card-value blue" id="s-positions">—</div></div>
      <div class="card"><div class="card-label">Live P&L</div><div class="card-value" id="s-livepnl">—</div></div>
      <div class="card"><div class="card-label">Win Rate</div><div class="card-value" id="s-winrate">—</div></div>
      <div class="card"><div class="card-label">Capital Used</div><div class="card-value white" id="s-capital">—</div></div>
    </div>
    <div class="sentiment-card">
      <div class="sentiment-header">
        <div class="sentiment-title">Market Sentiment</div>
        <div class="sentiment-badge" id="sentiment-badge">—</div>
      </div>
      <div class="sentiment-row"><div class="sentiment-label">India VIX</div><div class="sentiment-val" id="sent-vix">—</div></div>
      <div class="sentiment-row"><div class="sentiment-label">Nifty 50</div><div class="sentiment-val" id="sent-nifty">—</div></div>
      <div class="sentiment-row"><div class="sentiment-label">A/D Ratio</div><div class="sentiment-val" id="sent-ad">—</div></div>
      <div class="score-bar" id="score-bar"></div>
    </div>
  </div>

  <!-- POSITIONS -->
  <div class="section" id="tab-positions">
    <div id="positions-list"><div class="loading">Loading positions...</div></div>
  </div>

  <!-- SIGNALS -->
  <div class="section" id="tab-signals">
    <div id="signals-list"><div class="loading">Loading signals...</div></div>
  </div>

  <!-- TRADES -->
  <div class="section" id="tab-trades">
    <div id="trades-list"><div class="loading">Loading trades...</div></div>
  </div>

  <!-- P&L -->
  <div class="section" id="tab-pnl">
    <div id="pnl-list"><div class="loading">Loading P&L...</div></div>
  </div>

</div>

<script>
function showTab(name) {
  const names = ['overview','positions','signals','trades','pnl'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function fmt(n) {
  n = parseFloat(n)||0;
  return (n>=0?'+':'')+'\u20b9'+Math.abs(n).toLocaleString('en-IN',{maximumFractionDigits:0});
}
function fmtP(n) { return '\u20b9'+(parseFloat(n)||0).toLocaleString('en-IN',{maximumFractionDigits:2,minimumFractionDigits:2}); }
function cc(v) { return parseFloat(v)>=0?'green':'red'; }

function renderOverview(d) {
  const s = d.summary;
  document.getElementById('s-positions').textContent = s.open_positions;
  const lp = document.getElementById('s-livepnl');
  lp.textContent = fmt(s.live_pnl);
  lp.className = 'card-value '+cc(s.live_pnl);
  const wr = document.getElementById('s-winrate');
  wr.textContent = s.win_rate+'%';
  wr.className = 'card-value '+(s.win_rate>=50?'green':'yellow');
  document.getElementById('s-capital').textContent = fmtP(s.total_invested);

  const sent = d.sentiment;
  if (sent.error) return;
  const badge = document.getElementById('sentiment-badge');
  badge.textContent = sent.decision;
  badge.className = 'sentiment-badge badge-'+sent.decision.toLowerCase();
  const vixEl = document.getElementById('sent-vix');
  vixEl.textContent = sent.vix.toFixed(1);
  vixEl.className = 'sentiment-val '+(sent.vix<18?'green':sent.vix<22?'yellow':'red');
  const nEl = document.getElementById('sent-nifty');
  nEl.textContent = (sent.nifty_chg>=0?'+':'')+sent.nifty_chg.toFixed(2)+'%';
  nEl.className = 'sentiment-val '+cc(sent.nifty_chg);
  const adEl = document.getElementById('sent-ad');
  adEl.textContent = sent.ad_ratio.toFixed(2)+' ('+sent.advances+'\u2191 / '+sent.declines+'\u2193)';
  adEl.className = 'sentiment-val '+(sent.ad_ratio>=1.5?'green':sent.ad_ratio>=0.8?'yellow':'red');
  const bar = document.getElementById('score-bar');
  bar.innerHTML = '';
  for(let i=0;i<3;i++){
    const pip=document.createElement('div');
    pip.className='score-pip'+(i<sent.score?' filled':sent.score<0?' red':'');
    bar.appendChild(pip);
  }
}

function renderPositions(positions) {
  const el = document.getElementById('positions-list');
  if (!positions.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No open positions</div></div>';
    return;
  }
  el.innerHTML = positions.map(p => {
    const entry  = parseFloat(p.entry||0);
    const stop   = parseFloat(p.stop||0);
    const target = parseFloat(p.target||0);
    const ltp    = parseFloat(p.ltp||0);
    const pnl    = parseFloat(p.pnl||0);
    const pnlPct = parseFloat(p.pnl_pct||0);
    const shares = parseInt(p.shares||0);
    const status = p.status||'HOLDING';

    // Progress: position of LTP between stop and target
    const range = target - stop;
    const ltpProgress = range > 0 ? Math.min(100, Math.max(0, (ltp - stop) / range * 100)) : 50;
    const entryProgress = range > 0 ? Math.min(100, Math.max(0, (entry - stop) / range * 100)) : 50;

    const rr = (entry-stop)>0 ? ((target-entry)/(entry-stop)).toFixed(1) : '—';

    return `
    <div class="pos-card">
      <div class="pos-header">
        <div>
          <div class="pos-symbol">${p.symbol||'—'}</div>
          <div class="pos-meta">${p.strategy||''} · ${p.entry_date||''} · ${shares} shares</div>
        </div>
        <div class="pos-status status-${status}">${status}</div>
      </div>

      <div class="pos-price-row">
        <div>
          <div class="pos-ltp-label">Live Price</div>
          <div class="pos-ltp">${ltp ? fmtP(ltp) : '—'}</div>
        </div>
        <div class="pos-pnl">
          <div class="pos-pnl-val ${cc(pnl)}">${ltp ? fmt(pnl) : '—'}</div>
          <div class="pos-pnl-pct ${cc(pnlPct)}">${ltp ? (pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'%' : ''}</div>
        </div>
      </div>

      <div class="pos-grid">
        <div><div class="pos-item-label">Entry</div><div class="pos-item-val">${fmtP(entry)}</div></div>
        <div><div class="pos-item-label">Stop</div><div class="pos-item-val red">${fmtP(stop)}</div></div>
        <div><div class="pos-item-label">Target</div><div class="pos-item-val green">${fmtP(target)}</div></div>
        <div><div class="pos-item-label">R:R</div><div class="pos-item-val">${rr}x</div></div>
        <div><div class="pos-item-label">Invested</div><div class="pos-item-val">${fmtP(p.invested||entry*shares)}</div></div>
        <div><div class="pos-item-label">Shares</div><div class="pos-item-val">${shares}</div></div>
      </div>

      ${ltp ? `
      <div class="pos-progress-wrap">
        <div class="pos-progress-labels"><span class="red">${fmtP(stop)}</span><span class="green">${fmtP(target)}</span></div>
        <div class="pos-progress">
          <div class="pos-progress-fill" style="width:${ltpProgress}%;background:${pnl>=0?'var(--green)':'var(--red)'}"></div>
          <div class="pos-progress-entry" style="left:${entryProgress}%"></div>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderSignals(signals) {
  const el = document.getElementById('signals-list');
  if (!signals.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No signals — next scan at 3:45 PM</div></div>';
    return;
  }
  el.innerHTML = signals.map(s => {
    const entry  = parseFloat(s['Entry \u20b9']||s.entry||0);
    const stop   = parseFloat(s['Stop \u20b9'] ||s.stop ||0);
    const target = parseFloat(s['Target \u20b9']||s.target||0);
    const rr = (entry-stop)>0 ? ((target-entry)/(entry-stop)).toFixed(1) : '—';
    return `
    <div class="sig-card">
      <div class="sig-header">
        <div><div class="sig-symbol">${s['Symbol']||s.symbol||'—'}</div><div class="pos-meta">${s['Strategy']||s.strategy||''}</div></div>
        <div class="sig-rr">R:R ${rr}x</div>
      </div>
      <div class="sig-grid">
        <div><div class="pos-item-label">Entry</div><div class="pos-item-val">${fmtP(entry)}</div></div>
        <div><div class="pos-item-label">Stop</div><div class="pos-item-val red">${fmtP(stop)}</div></div>
        <div><div class="pos-item-label">Target</div><div class="pos-item-val green">${fmtP(target)}</div></div>
        <div><div class="pos-item-label">Shares</div><div class="pos-item-val">${s['Shares']||s.shares||0}</div></div>
        <div><div class="pos-item-label">Capital</div><div class="pos-item-val">${fmtP(s['Capital \u20b9']||s.capital_used||0)}</div></div>
        <div><div class="pos-item-label">Risk %</div><div class="pos-item-val">${parseFloat(s['Risk %']||s.risk_pct||0).toFixed(2)}%</div></div>
      </div>
      <div class="sig-reason">${s['Reason']||s.reason||''}</div>
    </div>`;
  }).join('');
}

function renderTrades(trades) {
  const el = document.getElementById('trades-list');
  if (!trades.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No closed trades yet</div></div>';
    return;
  }
  el.innerHTML=[...trades].reverse().map(t=>{
    const pnl=parseFloat(t.pnl||0);
    return `<div class="trade-row">
      <div><div class="trade-symbol">${t.symbol||'—'}</div><div class="trade-meta">${t.entry_date||''} → ${t.exit_date||''} · ${t.strategy||''}</div></div>
      <div><div class="trade-pnl ${cc(pnl)}">${fmt(pnl)}</div><div class="trade-reason">${t.exit_reason||''}</div></div>
    </div>`;
  }).join('');
}

function renderPnL(daily) {
  const el = document.getElementById('pnl-list');
  if (!daily.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">📈</div><div class="empty-text">No P&L data yet</div></div>';
    return;
  }
  el.innerHTML=[...daily].reverse().map(d=>{
    const pnl=parseFloat(d['Total P&L \u20b9']||0);
    return `<div class="trade-row">
      <div><div class="trade-symbol" style="font-size:13px">${d['Date']||'—'}</div><div class="trade-meta">${d['Open Positions']||0} positions · ${d['Mode']||''}</div></div>
      <div><div class="trade-pnl ${cc(pnl)}" style="font-size:13px">${fmt(pnl)}</div><div class="trade-reason ${cc(d['P&L %'])}">${d['P&L %']||''}</div></div>
    </div>`;
  }).join('');
}

async function fetchData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    document.getElementById('last-updated').textContent = data.last_updated;
    renderOverview(data);
    renderPositions(data.positions||[]);
    renderSignals(data.signals||[]);
    renderTrades(data.trade_log||[]);
    renderPnL(data.daily_pnl||[]);
  } catch(e) { console.error('Fetch failed:',e); }
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
